<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="unstarred">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.12" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <path id="st" d="M0,-8 L1.8,-2.5 L7.6,-2.5 L2.9,1 L4.7,6.5 L0,3.1 L-4.7,6.5 L-2.9,1 L-7.6,-2.5 L-1.8,-2.5 Z"/>
  </defs>
  <rect width="1280" height="360" rx="20" fill="#0b0e11"/>
  <rect width="1280" height="360" rx="20" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="1277" height="357" rx="19" fill="none" stroke="#1c242e" stroke-width="1.5"/>
  <text x="56" y="78" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="22" letter-spacing="0.5">
    <tspan fill="#34d399">awesome-ml-systems</tspan><tspan fill="#6b7280"> · hopsworks</tspan>
  </text>
  <text x="1224" y="76" text-anchor="end" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="22" fill="#6b7280">#012</text>

  <!-- what you starred: filled, connected -->
  <g fill="#34d399">
    <use href="#st" x="850" y="120"/>
    <use href="#st" x="905" y="95" transform="scale(1)"/>
    <use href="#st" x="878" y="170"/>
    <use href="#st" x="948" y="140"/>
  </g>
  <g stroke="#1f4437" stroke-width="1.2">
    <line x1="850" y1="120" x2="905" y2="95"/>
    <line x1="850" y1="120" x2="878" y2="170"/>
    <line x1="905" y1="95" x2="948" y2="140"/>
    <line x1="878" y1="170" x2="948" y2="140"/>
  </g>
  <!-- what you haven't seen: hollow, waiting -->
  <g fill="none" stroke="#3b4552" stroke-width="1.4">
    <use href="#st" x="1030" y="105"/>
    <use href="#st" x="1085" y="160"/>
    <use href="#st" x="1010" y="205"/>
    <use href="#st" x="1120" y="90"/>
    <use href="#st" x="1150" y="230"/>
    <use href="#st" x="1070" y="260"/>
  </g>
  <g stroke="#22303c" stroke-width="1" stroke-dasharray="3 4">
    <line x1="948" y1="140" x2="1030" y2="105"/>
    <line x1="948" y1="140" x2="1085" y2="160"/>
    <line x1="878" y1="170" x2="1010" y2="205"/>
  </g>

  <text x="56" y="180" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="56" font-weight="700" fill="#f3f4f6">✦&#160;&#160;unstarred</text>
  <text y="240" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="27" fill="#9ca3af"><tspan x="56" dy="0">Which repos would you have starred already,</tspan><tspan x="56" dy="38">if you had seen them?</tspan></text>
  <rect x="56" y="306" width="180" height="5" rx="2.5" fill="url(#accent)"/>
</svg>
